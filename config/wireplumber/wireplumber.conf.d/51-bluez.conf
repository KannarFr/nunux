# Bluetooth audio tuning for WirePlumber 0.5 (SPA-JSON drop-in).
# Mainly for Apple AirPods: enable the better SBC-XQ codec and keep AAC
# available, plus hardware volume control.
#
# AirPods quirk: AAC sounds best but has a known BlueZ bug where audio goes
# silent after a disconnect/reconnect (bluez/bluez#1093). If that bites you,
# drop "aac" from bluez5.codecs below so it negotiates sbc_xq, which is robust.

monitor.bluez.properties = {
  bluez5.enable-sbc-xq    = true
  bluez5.enable-msbc      = true
  bluez5.enable-hw-volume = true

  # Codecs offered, in preference order. Remove "aac" to force SBC-XQ.
  bluez5.codecs = [ aac sbc_xq sbc ]

  # Expose both A2DP (hi-fi stereo) and HFP (headset/mic) profiles.
  bluez5.roles  = [ a2dp_sink a2dp_source bap_sink bap_source hfp_hf hfp_ag ]
}
